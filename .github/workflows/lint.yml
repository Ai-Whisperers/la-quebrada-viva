name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install ruff==0.6.9 pytest
      - name: ruff check
        run: ruff check .
      - name: pytest (invariants)
        env:
          PYTHONPATH: .
        run: pytest tests/ -v
